server:
  port: 8082
#  servlet:
#    context-path: /api/incidents
  forward-headers-strategy: framework

spring:
  application:
    name: incidentiq-service

  # --- PostgreSQL ---
  datasource:
    url: jdbc:postgresql://localhost:5432/incidentiq
    username: postgres
    password: 687898
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

# --- Logging ---
logging:
  level:
    root: INFO
    com.incidentiq: DEBUG
  file:
    name: logs/incidentiq.log

# --- Swagger / OpenAPI ---
springdoc:
  api-docs:
    path: /v3/api-docs
    servers:
      - url: /api/incidents
        description: Gateway Server
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# --- Pagination defaults ---
spring.data.web.pageable:
  default-page-size: 10
  max-page-size: 100


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: ThisIsAVeryLongSecretKeyUsedForJWTTokenGenerationAndValidationItMustBeAtLeast256BitsLong
  expiration: 86400000 # 24 hours
