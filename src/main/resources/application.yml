server:
  port: 8082
#  servlet:
#    context-path: /api/incidents
  forward-headers-strategy: framework

spring:
  application:
    name: incidentiq-service

  # --- PostgreSQL ---
  datasource:
    url: jdbc:postgresql://localhost:5432/incidentiq_incidents
    username: postgres
    password: 687898
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

# --- Logging ---
logging:
  level:
    root: INFO
    com.incidentiq: DEBUG
  file:
    name: logs/incidentiq.log

# --- Swagger / OpenAPI ---
springdoc:
  api-docs:
    path: /v3/api-docs
    servers:
      - url: /api/incidents
        description: Gateway Server
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# --- Pagination defaults ---
spring.data.web.pageable:
  default-page-size: 10
  max-page-size: 100


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: ThisIsAVeryLongSecretKeyUsedForJWTTokenGenerationAndValidationItMustBeAtLeast256BitsLong
  expiration: 86400000 # 24 hours

# --- AI Copilot (OpenRouter) ---
# All values are env-overridable. Models are an ordered fallback chain (free models first).
ai:
  enabled: ${AI_ENABLED:true}
  api-key: ${OPENROUTER_API_KEY:}
  base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
  models: "${OPENROUTER_MODELS:openai/gpt-oss-20b:free,google/gemma-4-31b-it:free,nvidia/nemotron-nano-9b-v2:free,nvidia/nemotron-3-nano-30b-a3b:free,openai/gpt-oss-120b:free,meta-llama/llama-3.3-70b-instruct:free,qwen/qwen3-next-80b-a3b-instruct:free}"
  referer: ${OPENROUTER_REFERER:https://incidentiq.app}
  app-title: ${OPENROUTER_APP_TITLE:IncidentIQ Copilot}
  connect-timeout-ms: ${AI_CONNECT_TIMEOUT_MS:8000}
  read-timeout-ms: ${AI_READ_TIMEOUT_MS:45000}
  max-retries-per-model: ${AI_MAX_RETRIES:1}
  temperature: ${AI_TEMPERATURE:0.3}
  max-tokens: ${AI_MAX_TOKENS:900}
  cache-ttl-seconds: ${AI_CACHE_TTL:900}
  unhealthy-cooldown-seconds: ${AI_UNHEALTHY_COOLDOWN:120}
  failure-threshold: ${AI_FAILURE_THRESHOLD:3}
